<section class="aporte-page">
  <div class="aporte-card">
    <h1 class="aporte-title">DANOS TU APORTE A LA COMUNIDAD</h1>
    <div class="ball">🏈</div>

    <div class="tabs">
      <button
        type="button"
        class="tab"
        [class.active]="tab === 'login'"
        (click)="setTab('login')"
      >
        Iniciar sesión
      </button>

      <button
        type="button"
        class="tab"
        [class.active]="tab === 'register'"
        (click)="setTab('register')"
      >
        Registrarse
      </button>
    </div>

    <div class="divider"></div>

    <div *ngIf="errorMsg" class="alert">{{ errorMsg }}</div>

    <!-- LOGIN -->
    <form *ngIf="tab === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <label class="lbl">Correo electrónico</label>
      <input class="inp" type="email" formControlName="email" />

      <label class="lbl">Contraseña</label>
      <input class="inp" type="password" formControlName="password" />

      <button class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>


    
    <!-- ✅ MFA STEP -->
<div *ngIf="tab === 'mfa'" class="mt-3">
  <div class="alert alert-info">
    Te enviamos un código a tu correo. Escríbelo para finalizar el inicio de sesión.
  </div>

  <form [formGroup]="mfaForm" (ngSubmit)="onVerifyMfa()">
    <div class="mb-3">
      <label class="form-label">Código (6 dígitos)</label>
      <input
        type="text"
        class="form-control"
        formControlName="code"
        maxlength="6"
        placeholder="Ej: 123456"
      />
    </div>

    <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
      {{ loading ? 'Verificando...' : 'Verificar' }}
    </button>

    <button class="btn btn-outline-light w-100 mt-2" type="button" (click)="onResendMfa()" [disabled]="loading">
      Reenviar código
    </button>

    <div class="text-danger mt-2" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>
  </form>
</div>

    <!-- REGISTER -->
    <form
      *ngIf="tab === 'register'"
      [formGroup]="registerForm"
      (ngSubmit)="onRegister()"
    >
      <label class="lbl">Nombre de usuario</label>
      <input class="inp" type="text" formControlName="nombre" placeholder="Nombre de usuario" required />

      <label class="lbl">Correo electrónico</label>
      <input class="inp" type="email" formControlName="email" placeholder="Correoelectrónico@example.com"  required/>

      <label class="lbl">Equipo favorito</label>
      <select class="inp" formControlName="equipo" required>
        <option value="">Selecciona tu equipo...</option>
        <option *ngFor="let t of teams" [value]="t">{{ t }}</option>
      </select>

      <label class="lbl">Contraseña</label>
      <input class="inp" type="password" formControlName="password" placeholder="Contraseña" required />

      <button class="btn btn-success" [disabled]="loading">
        {{ loading ? 'Creando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="footer">© 2025 NFL Fans</p>
  </div>
</section>
